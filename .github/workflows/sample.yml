name: Manual Workflow

on:
  push:
    branches: [main, master]
       
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production


jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Log level: ${{ inputs.log_level }}"

      - name: Run task
        run: echo "Running manual workflow on ${{ inputs.environment }}"
