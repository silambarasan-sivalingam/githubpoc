name: Manual Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      log_level:
        description: "Log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warning
          - error

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Log level: ${{ inputs.log_level }}"

      - name: Run task
        run: echo "Running manual workflow on ${{ inputs.environment }}"
